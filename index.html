<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
padding:10px;
font-family:Sarabun,sans-serif;
}
#reader{
width:100%;
}
</style>
</head>

<body>

<div id="reader"></div>

<script>

function onScanSuccess(decodedText){

    if(window.opener){

        window.opener.postMessage(
        {
            type:"QR_SCANNED",
            id:decodedText
        },
        "*");

    }

}

new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
).render(onScanSuccess);

</script>

</body>
</html>
