<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner (Fast Scan)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0d0f12;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #reader {
            width: 100vw !important;
            height: 100vh !important;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: cover;
            z-index: 1;
        }

        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            text-align: center;
            padding: 24px 20px;
            color: #fff;
            background: linear-gradient(rgba(13, 15, 18, 0.9), rgba(13, 15, 18, 0));
        }

        .school {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.8;
            font-weight: 300;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .scan-box {
            position: absolute;
            width: 260px;
            height: 260px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 0 0 4000px rgba(13, 15, 18, 0.65);
            border-radius: 4px;
        }

        .scan-box::before, .scan-box::after, .scan-box-inner::before, .scan-box-inner::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #00ff88;
        }
        .scan-box::before { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 16px; }
        .scan-box::after { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 16px; }
        
        .scan-box-inner {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .scan-box-inner::before { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 16px; }
        .scan-box-inner::after { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 16px; }

        .scan-line {
            position: absolute;
            left: 15px;
            right: 15px;
            height: 3px;
            background: linear-gradient(90deg, rgba(0,255,136,0), rgba(0,255,136,1) 50%, rgba(0,255,136,0));
            box-shadow: 0 0 12px #00ff88, 0 0 20px #00ff88;
            animation: scan 1.8s ease-in-out infinite; /* ปรับแอนิเมชันให้วิ่งเร็วขึ้นตามความเร็วสแกน */
        }

        @keyframes scan {
            0% { top: 20px; opacity: 0.3; }
            50% { top: 240px; opacity: 1; }
            100% { top: 20px; opacity: 0.3; }
        }

        .result {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            text-align: center;
            z-index: 999;
            pointer-events: none;
        }

        .result-card {
            display: inline-block;
            background: rgba(13, 15, 18, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 90%;
        }

        .success {
            color: #00ff88;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 999;
        }

        .btn-close {
            border: none;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.1);
        }

        .btn-close:active {
            transform: scale(0.95);
            background: rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="school">📷 ระบบสแกน QR Code</div>
    <div class="subtitle">โรงเรียนอนุบาลพิบูลมังสาหารวิภาคย์วิทยากร</div>
</div>

<div id="reader"></div>

<div class="scan-box">
    <div class="scan-box-inner"></div>
    <div class="scan-line"></div>
</div>

<div id="result" class="result"></div>

<div class="footer">
    <button class="btn-close" onclick="closeScanner()">
        ❌ ปิดหน้าสแกน
    </button>
</div>

<script>
let scanner;

function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    audio.play();
}

function onScanSuccess(decodedText) {
    document.getElementById("result").innerHTML = `
        <div class="result-card">
            <span class="success">✅ สแกนสำเร็จ: ${decodedText}</span>
        </div>
    `;

    if (navigator.vibrate) {
        navigator.vibrate(300);
    }

    beep();

    if (window.opener) {
        window.opener.postMessage({
            type: "QR_SCANNED",
            id: decodedText
        }, "*");
    }

    setTimeout(() => {
        window.close();
    }, 1200);
}

async function startScanner() {
    scanner = new Html5Qrcode("reader");

    // CONFIGURATION ปรับความเร็วสูงสุดสำหรับการสแกนด่วน (Super Fast Scan)
    const config = {
        fps: 30,             // เพิ่มการจับภาพเป็น 30 เฟรมต่อวินาที (ภาพลื่นขึ้น ตรวจจับโค้ดได้ถี่และไวขึ้นมาก)
        qrbox: undefined,    // เปลี่ยนเป็น undefined เพื่อให้ระบบค้นหา QR Code ทั่วทั้งหน้าจอ ไม่จำกัดพื้นที่เล็ง
        aspectRatio: window.screen.width / window.screen.height,
        disableFlip: true    // ปิดการกลับด้านภาพ เพื่อประหยัด CPU ทำให้ประมวลผลภาพได้เร็วขึ้นอีกขั้น
    };

    // บังคับเปิดกล้องหลังสิ่งแวดล้อม (environment) ทันที
    scanner.start(
        { facingMode: "environment" },
        config,
        onScanSuccess
    ).catch(err => {
        fallbackCameraStart();
    });
}

async function fallbackCameraStart() {
    try {
        const cameras = await Html5Qrcode.getCameras();
        let selectedCamera = cameras[0];

        for (let camera of cameras) {
            const label = camera.label.toLowerCase();
            if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                selectedCamera = camera;
                break;
            }
        }

        scanner.start(
            selectedCamera.id,
            { fps: 30, disableFlip: true },
            onScanSuccess
        );
    } catch (err) {
        console.error("ไม่สามารถเปิดกล้องได้:", err);
    }
}

function closeScanner() {
    if (scanner) {
        scanner.stop()
            .then(() => { window.close(); })
            .catch(() => { window.close(); });
    } else {
        window.close();
    }
}

window.addEventListener('DOMContentLoaded', startScanner);
</script>

</body>
</html>
