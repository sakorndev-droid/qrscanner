<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Sarabun,sans-serif;
padding:20px;
text-align:center;
}

#reader{
width:100%;
max-width:400px;
margin:auto;
}
</style>

</head>
<body>

<h3>สแกน QR Code</h3>

<div id="reader"></div>

<p id="result"></p>

<script>

function onScanSuccess(decodedText){

document.getElementById("result").innerHTML =
"QR : "+decodedText;

sendToSheet(decodedText);
}

new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
).render(onScanSuccess);

function sendToSheet(qr){

fetch("YOUR_WEBAPP_URL",{
method:"POST",
body:JSON.stringify({
qr:qr
})
})
.then(r=>r.text())
.then(data=>{
console.log(data);
});
}

</script>

</body>
</html>
